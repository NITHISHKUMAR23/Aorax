name: Aorax Docker CI/CD

on:
  push:
    branches:
      - Aorax_Dev

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/aorax:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/aorax:latest